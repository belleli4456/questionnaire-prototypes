<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>问卷调查原型入口</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2329;
      --muted: #667085;
      --line: #e5e7eb;
      --brand: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .list {
      display: grid;
      gap: 16px;
      margin-top: 28px;
    }
    .item {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .item:hover {
      transform: translateY(-2px);
      border-color: #cfe0ff;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.08);
    }
    .title {
      font-size: 20px;
      font-weight: 700;
    }
    .desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }
    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>问卷调查原型入口</h1>
      <p>这个页面用于给同事统一查看原型。点击下面任一链接即可直接打开对应页面。</p>

      <div class="list">
        <a class="item" href="./ops-admin.html">
          <div class="title">运营后台原型</div>
          <div class="desc">问卷调查后台管理页面</div>
        </a>

        <a class="item" href="./miniapp.html">
          <div class="title">小程序端原型</div>
          <div class="desc">问卷调查小程序侧页面</div>
        </a>
      </div>

      <div class="footer">如果你是从文档中打开，建议优先收藏这个入口页链接。</div>
    </section>
  </main>
</body>
</html>
